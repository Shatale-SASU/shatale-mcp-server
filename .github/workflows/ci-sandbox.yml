name: "CI: Sandbox (authenticated)"

# SHAT-1449: live-sandbox tests no longer gate PRs/pushes. Deterministic
# contract coverage runs in ci-public.yml (mock upstream, no live key); the
# full live suite runs nightly (nightly.yml) and on-demand via this workflow.
on:
  workflow_dispatch:

jobs:
  sandbox-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc

      - name: Check SHATALE_TEST_KEY
        run: |
          if [ -z "$SHATALE_TEST_KEY" ]; then
            echo "::error::SHATALE_TEST_KEY is required to run the live sandbox suite."
            exit 1
          fi
        env:
          SHATALE_TEST_KEY: ${{ secrets.SHATALE_TEST_KEY }}

      - name: Run all tests (public + sandbox)
        run: npm test
        env:
          SHATALE_TEST_KEY: ${{ secrets.SHATALE_TEST_KEY }}

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-server-logs-sandbox
          path: /tmp/mcp-test-*.log
          retention-days: 7
          if-no-files-found: ignore
