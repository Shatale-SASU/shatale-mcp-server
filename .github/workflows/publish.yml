name: "Publish to npm (Trusted Publishing)"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually publish)"
        type: boolean
        default: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc
      - name: Run public tests
        run: npm run test:public

  publish:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write  # Required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 20 ships npm 10.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest
      - run: npm ci
      - run: npx tsc

      - name: Verify version matches tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version: $PKG_VERSION"

      - name: Publish (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: npm publish --dry-run

      # Authenticates via OIDC trusted publishing (no NPM_TOKEN). Registered at
      # npmjs.com → shatale-mcp-server → Trusted Publisher (repo + publish.yml).
      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true' || github.event_name == 'release'
        run: npm publish --provenance --access public

      - name: Notify on Telegram
        if: success() && github.event_name == 'release'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          curl -sf -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="[i] MCP Server v${VERSION} published to npm" \
            >/dev/null 2>&1 || true
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
