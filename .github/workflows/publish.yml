name: "Publish to npm (Trusted Publishing)"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually publish)"
        type: boolean
        default: true
      force_publish:
        description: "Override the SHAT-1446 release freeze (publish for real)"
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc
      - name: Run public tests
        run: npm run test:public

  publish:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write  # Required for npm trusted publishing (OIDC)
    steps:
      - name: "Release freeze gate (SHAT-1446)"
        # Block any real publish (release events or non-dry-run dispatch) until the
        # standalone v0.2.4 / monorepo v0.2.2 drift is reconciled. Dry runs still pass.
        if: github.event_name == 'release' || github.event.inputs.dry_run != 'true'
        run: |
          if [ "${{ github.event.inputs.force_publish }}" != "true" ]; then
            echo "::error::npm publish is FROZEN (SHAT-1446). MCP drift between standalone v0.2.4 and monorepo v0.2.2 must be reconciled before release. To override deliberately, re-run via workflow_dispatch with force_publish=true."
            exit 1
          fi
          echo "Freeze overridden via force_publish=true — proceeding to publish."

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npx tsc

      - name: Verify version matches tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version: $PKG_VERSION"

      - name: Publish (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true' || github.event_name == 'release'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Notify on Telegram
        if: success() && github.event_name == 'release'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          curl -sf -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="[i] MCP Server v${VERSION} published to npm" \
            >/dev/null 2>&1 || true
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
